# Docker's embedded DNS keeps upstream addresses fresh across hot-reload
# container recreations. Variables defer resolution until request time.
resolver 127.0.0.11 valid=10s ipv6=off;

ssl_certificate /etc/nginx/certs/auth.maintainerd.local.crt;
ssl_certificate_key /etc/nginx/certs/auth.maintainerd.local.key;
ssl_protocols TLSv1.2 TLSv1.3;
ssl_session_cache shared:LocalTLS:10m;
ssl_session_timeout 1h;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Plain HTTP exists only to move local browser traffic onto HTTPS.
server {
    listen 80 default_server;
    server_name *.auth.maintainerd.local;
    return 308 https://$host$request_uri;
}

# ──────────────────────────────────────────────────────────────────────────────
# maintainerd — Internal API (port 8080, VPN/private access)
#   Host: private-api.auth.maintainerd.local
# ──────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name private-api.auth.maintainerd.local;

    location = / {
        return 200 '{"message":"Internal Auth API","status":"running","api_path":"/api/v1/"}';
        add_header Content-Type application/json;
    }

    location /api/ {
        set $auth_internal http://maintainerd-auth:8080;
        proxy_pass $auth_internal;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 16k;
    }
}

# ──────────────────────────────────────────────────────────────────────────────
# maintainerd — Public API (port 8081, internet-facing)
#   Host: public-api.auth.maintainerd.local
# ──────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name public-api.auth.maintainerd.local;

    location = / {
        return 200 '{"message":"Public Auth API","status":"running","api_path":"/api/v1/"}';
        add_header Content-Type application/json;
    }

    location /api/ {
        set $auth_public http://maintainerd-auth:8081;
        proxy_pass $auth_public;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 16k;
    }
}

# ──────────────────────────────────────────────────────────────────────────────
# maintainerd — Console frontend (dev server, port 3000 in container)
#   Host: console.auth.maintainerd.local
# ──────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name console.auth.maintainerd.local;

    # Keep browser requests same-origin while routing the console exclusively to
    # the internal management API. This bypasses an unnecessary Vite proxy hop.
    location /api/ {
        set $auth_internal http://maintainerd-auth:8080;
        proxy_pass $auth_internal;
        proxy_set_header Host private-api.auth.maintainerd.local;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 16k;
    }

    location / {
        set $console http://maintainerd-auth-console:3000;
        proxy_pass $console;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
    }
}

# ──────────────────────────────────────────────────────────────────────────────
# maintainerd — Identity frontend (dev server, port 3000 in container)
#   Host: identity.auth.maintainerd.local
# ──────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name identity.auth.maintainerd.local;

    # The hosted identity UI is restricted to the public API surface.
    location /api/ {
        set $auth_public http://maintainerd-auth:8081;
        proxy_pass $auth_public;
        proxy_set_header Host public-api.auth.maintainerd.local;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 16k;
    }

    location / {
        set $identity http://maintainerd-auth-identity:3000;
        proxy_pass $identity;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
    }
}

