# ──────────────────────────────────────────────────────────────────────────────
# maintainerd — Internal API (port 8080, VPN/private access)
#   Host: private-api.auth.maintainerd.local
# ──────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name private-api.auth.maintainerd.local;

    location = / {
        return 200 '{"message":"Internal Auth API","status":"running","api_path":"/api/v1/"}';
        add_header Content-Type application/json;
    }

    location /api/ {
        proxy_pass http://maintainerd-auth:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 16k;
    }
}

# ──────────────────────────────────────────────────────────────────────────────
# maintainerd — Public API (port 8081, internet-facing)
#   Host: public-api.auth.maintainerd.local
# ──────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name public-api.auth.maintainerd.local;

    location = / {
        return 200 '{"message":"Public Auth API","status":"running","api_path":"/api/v1/"}';
        add_header Content-Type application/json;
    }

    location /api/ {
        proxy_pass http://maintainerd-auth:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 16k;
    }
}

# ──────────────────────────────────────────────────────────────────────────────
# maintainerd — Console frontend (dev server, port 3000 in container)
#   Host: console.auth.maintainerd.local
# ──────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name console.auth.maintainerd.local;

    location / {
        proxy_pass http://maintainerd-auth-console:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}

# ──────────────────────────────────────────────────────────────────────────────
# maintainerd — Identity frontend (dev server, port 3000 in container)
