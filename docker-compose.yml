# =============================================================================
# maintainerd — Development Environment
# =============================================================================
# Profiles:
#   auth    All auth services (backend + frontends + databases + nginx)
#   auth-observed  Auth + observability (Prometheus + Grafana + SigNoz)
#   all            Everything (currently equivalent to auth-observed)
#
# Usage:
#   ./maintainerd up --profile=auth -d
#   ./maintainerd up --profile=auth-observed -d
#   ./maintainerd down
# =============================================================================

# Pull in SigNoz (OTLP collector, ClickHouse, UI). SigNoz listens on host ports
# 4317/4318 (gRPC/HTTP); its UI is at http://localhost:8080.
# Vendored from github.com/SigNoz/signoz (deploy/) at v0.128.0.
include:
  - deploy/signoz/docker/docker-compose.yaml

services:
  # The included SigNoz services are unprofiled upstream. Assign them here so
  # auth stays lightweight while auth-observed and all remain complete.
  init-clickhouse:
    profiles: ["auth-observed", "all"]

  zookeeper-1:
    profiles: ["auth-observed", "all"]

  clickhouse:
    profiles: ["auth-observed", "all"]

  signoz:
    profiles: ["auth-observed", "all"]

  otel-collector:
    profiles: ["auth-observed", "all"]
    networks:
      - default
      - signoz-net

  signoz-telemetrystore-migrator:
    profiles: ["auth-observed", "all"]

  # ── Infrastructure (shared across profiles) ─────────────────────────────────

  postgres-db:
    image: postgres:17
    container_name: postgres-db
    profiles: ["auth", "auth-observed", "all"]
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: Pass123
      POSTGRES_DB: maintainerd
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "devuser", "-d", "maintainerd"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis-db:
    image: redis:7
    container_name: redis-db
    profiles: ["auth", "auth-observed", "all"]
    ports:
      - "6379:6379"
    command: ["redis-server", "--requirepass", "Pass123"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "Pass123", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    profiles: ["auth", "auth-observed", "all"]
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: devuser
      RABBITMQ_DEFAULT_PASS: Pass123
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── Backend ─────────────────────────────────────────────────────────────────

  maintainerd-auth:
    build:
      context: ../maintainerd-auth
      dockerfile: Dockerfile.local
    image: m9d-auth-dev
    container_name: m9d-auth-dev
    profiles: ["auth", "auth-observed", "all"]
    volumes:
      - ../maintainerd-auth:/usr/src/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    environment:
      - ENV=local
      - CGO_ENABLED=0
      # The launcher enables OTLP only when an observability profile is active.
      # This avoids reconnect loops in the lightweight auth stack.
      - OTEL_ENABLED=${MAINTAINERD_OTEL_ENABLED:-false}
    init: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres-db:
        condition: service_healthy
      redis-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - default
    restart: unless-stopped

  # ── nginx (API gateway) ─────────────────────────────────────────────────────

  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    profiles: ["auth", "auth-observed", "all"]
    ports:
      - "80:80"
    volumes:
      - ./nginx/local.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      default:
        aliases:
          - private-api.auth.maintainerd.local
          - public-api.auth.maintainerd.local
          - console.auth.maintainerd.local
          - identity.auth.maintainerd.local
    depends_on:
      - maintainerd-auth
    restart: unless-stopped

  # ── Frontends ───────────────────────────────────────────────────────────────

  maintainerd-auth-console:
    build:
      context: ../maintainerd-auth-console
      dockerfile: Dockerfile.local
    image: m9d-console-dev
    container_name: m9d-console-dev
    profiles: ["auth", "auth-observed", "all"]
    ports:
      - "5173:3000"
    volumes:
      - ../maintainerd-auth-console:/app
      - console-node-modules:/app/node_modules
    environment:
      - NODE_ENV=development
      # Polling is reliable for bind mounts and avoids host inotify exhaustion.
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=300
    depends_on:
      - maintainerd-auth
    init: true
    restart: unless-stopped

  maintainerd-auth-identity:
    build:
      context: ../maintainerd-auth-identity
      dockerfile: Dockerfile.local
    image: m9d-identity-dev
    container_name: m9d-identity-dev
    profiles: ["auth", "auth-observed", "all"]
    ports:
      - "5174:3000"
    volumes:
      - ../maintainerd-auth-identity:/app
      - identity-node-modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=300
    depends_on:
      - maintainerd-auth
    init: true
    restart: unless-stopped

  # ── Observability (auth-observed and all profiles) ──────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    profiles: ["auth-observed", "all"]
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    profiles: ["auth-observed", "all"]
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  go-mod-cache:
  go-build-cache:
  console-node-modules:
  identity-node-modules:
  prometheus-data:
  grafana-data:

networks:
  default:
    driver: bridge
  signoz-net:
    name: signoz-net
