global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: maintainerd-auth
    metrics_path: /metrics
    static_configs:
      - targets:
          - auth:8082
        labels:
          service: maintainerd-auth
          environment: local

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
